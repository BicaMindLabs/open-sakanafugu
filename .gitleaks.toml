# gitleaks config — extends the default rule set + this repo's allowlist
[extend]
useDefault = true

[allowlist]
description = "Placeholders and valid attributions, not real secrets"
regexes = [
  # the <PROVIDER_API_KEY> placeholder in ccb.config.example
  '''<[A-Z_]+_API_KEY>''',
  # example ID snippets in the docs
  '''sk-xxx|sk-\.\.\.|<your-[a-z-]+>''',
]
paths = [
  # the template file inherently contains a placeholder key=, not a leak
  '''orchestration/ccb/ccb\.config\.example''',
]
