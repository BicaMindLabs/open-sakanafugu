name: Feature / new provider request
description: Add a provider, extend orchestration, improve the loop, etc.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to solve
      description: What's missing now / what's awkward
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      placeholder: |
        For a new provider, please include: Anthropic-compatible base_url + model ID + official docs link
    validations:
      required: true
  - type: textarea
    id: alts
    attributes:
      label: Alternatives / things already tried
