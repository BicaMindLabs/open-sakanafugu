name: Bug report
description: Something broke in the launcher / orchestration / sync
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **Do not paste API keys / tokens / a full `ccb.config` here.** Redact logs before pasting.
  - type: input
    id: component
    attributes:
      label: Component that broke
      placeholder: backends/cc-glm · fanout · ccb · cc-sync · cn-plugin
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: Symptom
      description: Expected vs actual
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `cc-glm ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: macOS/Linux version · node version · claude-code version · provider
  - type: textarea
    id: logs
    attributes:
      label: Logs (redacted)
      render: shell
